<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Whimsical Weather Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Playfair+Display:ital,wght@0,400;1,400;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* Your updated artsy theme colors */
            --desk-wood: #5D6B6B;
            --paper: #F7F3F0;
            --ink: #5D6B6B;
            --accent-pink: #F7CBCA;
            --sky-blue: #6DD7D8;
            --pencil-gray: #8a9a9a;
            --line-color: #CDD3C2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--desk-wood);
            /* Coffee stain and wood texture integrated with your new theme */
            background-image: 
                radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                url("https://www.transparenttextures.com/patterns/dark-wood.png");
            font-family: 'Lora', serif;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 40px;
        }

        /* ── JOURNAL SPREAD ── */
        .journal-spread {
            background: var(--paper);
            width: 100%;
            max-width: 1100px;
            min-height: 750px;
            display: flex;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.3);
            position: relative;
            transform: rotate(-0.5deg);
            border-radius: 4px;
            z-index: 2;
        }

        /* Sakura Flower - Now pinned to the notebook so it scrolls */
        .journal-spread::after {
            content: '🌸';
            position: absolute;
            top: -45px;
            left: -35px;
            font-size: 80px;
            filter: drop-shadow(5px 5px 5px rgba(0,0,0,0.1)) sepia(0.2);
            z-index: 10;
            pointer-events: none;
        }

        /* Angelskin Pen - Now pinned to the notebook bottom-left */
        .page-left::before {
            content: '';
            position: absolute;
            bottom: -10px;
            left: -10px;
            width: 300px;
            height: 300px;
            background-image: url('angelskin.png');
            background-size: contain;
            background-repeat: no-repeat;
            transform: rotate(-20deg);
            filter: drop-shadow(15px 15px 10px rgba(0,0,0,0.2)) sepia(0.1);
            z-index: 20;
            pointer-events: none;
        }

        /* Sticker - Pinned to notebook top-right */
        .journal-spread::before {
            content: '⭐ April Memories';
            position: absolute;
            top: -20px;
            right: -10px;
            background: var(--accent-pink);
            color: var(--ink);
            padding: 5px 15px;
            font-family: 'Caveat', cursive;
            font-weight: 700;
            transform: rotate(15deg);
            box-shadow: 3px 3px 5px rgba(0,0,0,0.1);
            z-index: 10;
        }

        .binding-line {
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to right, rgba(0,0,0,0.05), rgba(0,0,0,0.02) 50%, rgba(0,0,0,0.05));
            transform: translateX(-50%);
            z-index: 5;
        }

        .page { flex: 1; padding: 60px 45px; position: relative; }
        .page-left { border-right: 1px solid rgba(0,0,0,0.05); }

        .month-header {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: 3rem;
            color: var(--ink);
            text-align: center;
            margin-bottom: 25px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            border: 1px solid var(--line-color);
            padding: 10px;
            background: rgba(255,255,255,0.3);
        }

        .day-label {
            font-family: 'Caveat', cursive;
            font-size: 1.1rem;
            text-align: center;
            padding-bottom: 5px;
            color: var(--pencil-gray);
        }

        .day-cell {
            aspect-ratio: 1;
            border: 1px solid rgba(0,0,0,0.03);
            position: relative;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Caveat', cursive;
            font-size: 1.2rem;
        }

        .day-cell.empty { border: none; cursor: default; }

        .day-cell:hover:not(.future):not(.empty) {
            transform: translateY(-3px);
            background: white;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .day-num {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 0.8rem;
            opacity: 0.5;
        }

        .weather-icon { font-size: 1.5rem; }

        .page-right { display: flex; flex-direction: column; }
        
        .entry-date {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            border-bottom: 1px solid var(--accent-pink);
            margin-bottom: 25px;
            padding-bottom: 8px;
        }

        .weather-story { 
            font-size: 1.3rem; 
            line-height: 2.2rem; 
            flex: 1; 
            /* Your custom ruling line color */
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 2.2rem;
        }

        .note-pad {
            margin-top: 30px;
            padding: 20px;
            border: 1px dashed var(--accent-pink);
            background: rgba(247, 203, 202, 0.1);
            font-family: 'Caveat', cursive;
            font-size: 1.2rem;
            border-radius: 8px;
        }

        @media (max-width: 900px) {
            body { padding: 20px; }
            .journal-spread { flex-direction: column; transform: none; }
            .page-left::before, .journal-spread::after { display: none; }
        }
    </style>
</head>
<body>

    <main class="journal-spread">
        <div class="binding-line"></div>
        <section class="page page-left">
            <h1 class="month-header">April 2026</h1>
            <div class="calendar-grid" id="calendarGrid">
                </div>
        </section>

        <section class="page page-right" id="entryPanel">
            <div class="entry-date" id="viewDate">April 19, 2026</div>
            <div class="weather-story" id="viewText">
                Waiting for the ink to dry and the winds from <span id="userCity">your city</span> to arrive...
            </div>
            <div class="note-pad">
                <strong>Ink Notes:</strong>
                <p id="viewNotes">The weather defines the local atmosphere. Select a date to see the memory.</p>
            </div>
        </section>
    </main>

    <script>
        const weatherTypes = [
            { icon: '☀️', mood: 'Sunny', desc: 'A bright, smiling day with golden rays.' },
            { icon: '☁️', mood: 'Cloudy', desc: 'The sky is wearing a soft, gray blanket.' },
            { icon: '🌧️', mood: 'Rainy', desc: 'Little hearts falling from the sky.' },
            { icon: '🌈', mood: 'Rainbow', desc: 'A magical bridge after a light sprinkle.' },
            { icon: '🌬️', mood: 'Windy', desc: 'The trees are dancing in a cool breeze.' }
        ];

        let detectedCity = "this quiet place";

        async function fetchLocalWeather(lat, lon) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                const code = data.current_weather.weathercode;
                if (code === 0) return weatherTypes[0];
                if (code <= 3) return weatherTypes[1];
                if (code >= 51) return weatherTypes[2];
                return weatherTypes[4];
            } catch (e) { return weatherTypes[0]; }
        }

        async function initCalendar() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;

                try {
                    const geoResp = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${lat}&lon=${lon}`);
                    const geoData = await geoResp.json();
                    detectedCity = geoData.address.city || geoData.address.town || geoData.address.village || "this quiet place";
                    document.getElementById('userCity').innerText = detectedCity;
                } catch (e) { console.log("City fetch failed"); }

                const localWeather = await fetchLocalWeather(lat, lon);
                populateGrid(localWeather);
            }, () => {
                populateGrid(weatherTypes[0]);
            });
        }

        function populateGrid(baseWeather) {
            const grid = document.getElementById('calendarGrid');
            const today = new Date();
            const currentDay = today.getDate();

            grid.innerHTML = `
                <div class="day-label">Sun</div><div class="day-label">Mon</div>
                <div class="day-label">Tue</div><div class="day-label">Wed</div>
                <div class="day-label">Thu</div><div class="day-label">Fri</div>
                <div class="day-label">Sat</div>
            `;

            // Offset for April 2026 (Starts on Wed = 3 empty cells)
            for (let e = 0; e < 3; e++) {
                const emptyCell = document.createElement('div');
                emptyCell.className = 'day-cell empty';
                grid.appendChild(emptyCell);
            }

            for (let i = 1; i <= 30; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                if (i > currentDay) {
                    cell.classList.add('future');
                    cell.style.opacity = "0.2";
                    cell.innerHTML = `<span class="day-num">${i}</span>`;
                } else {
                    const weather = Math.random() > 0.8 ? weatherTypes[Math.floor(Math.random()*5)] : baseWeather;
                    cell.innerHTML = `<span class="day-num">${i}</span><span class="weather-icon">${weather.icon}</span>`;
                    cell.onclick = () => updateEntry(i, weather);
                }
                grid.appendChild(cell);
            }
        }

        function updateEntry(day, weather) {
            // Updated with your requested ink palette
            const inkColors = {
                'Sunny': '#4A90E2', // Bright Sky Blue
                'Rainy': '#2C3E50', // Deep Rainy Slate
                'Windy': '#16A085', // Teal/Seafoam
                'Stormy': '#34495E', // Dark Grey Storm
                'Cloudy': '#95A5A6', // Soft Cloud Grey
                'Rainbow': 'linear-gradient(45deg, #FF6B6B, #FFD93D, #6BCB77, #4D96FF, #9B59B6)' 
            };

            const selectedColor = inkColors[weather.mood] || 'var(--ink)';
            const storyText = document.getElementById('viewText');
            const notesText = document.getElementById('viewNotes');
            const dateHeader = document.getElementById('viewDate');

            if (weather.mood === 'Rainbow') {
                storyText.style.backgroundImage = inkColors['Rainbow'];
                storyText.style.webkitBackgroundClip = 'text';
                storyText.style.webkitTextFillColor = 'transparent';
                storyText.style.display = 'inline-block';
            } else {
                storyText.style.backgroundImage = 'none';
                storyText.style.webkitTextFillColor = 'initial';
                storyText.style.color = selectedColor;
            }

            notesText.style.color = (weather.mood === 'Rainbow') ? '#8E44AD' : selectedColor;
            dateHeader.style.borderColor = selectedColor;
            dateHeader.innerText = `April ${day}, 2026`;
            
            storyText.innerHTML = `Today in <strong>${detectedCity}</strong>, it is a <em>${weather.mood}</em> day. ${weather.desc}`; 

            const panel = document.getElementById('entryPanel');
            panel.style.opacity = 0;
            setTimeout(() => { panel.style.opacity = 1; panel.style.transition = 'opacity 0.5s'; }, 50);
        }

        document.addEventListener('DOMContentLoaded', initCalendar);
    </script>
</body>
</html>
