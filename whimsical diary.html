<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Whimsical Weather Journal</title>
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&family=Playfair+Display:ital,wght@0,400;1,400;1,600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --desk-wood: #5D6B6B;
            --paper: #F7F3F0;
            --ink: #5D6B6B;
            --accent-pink: #F7CBCA;
            --sky-blue: #6DD7D8;
            --pencil-gray: #8a9a9a;
            --line-color: #CDD3C2;
            --teal-dark: #3a9a9a;
            --mist: #D5E6E5;
            --sage: #CDD3C2;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--desk-wood);
            background-image:
                radial-gradient(circle at 15% 15%, rgba(93, 107, 107, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 85% 85%, rgba(109, 215, 216, 0.08) 0%, transparent 50%);
            font-family: 'Lora', Georgia, serif;
            color: var(--ink);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 80px 40px; /* Zoomed out feel */
        }

/* ── DECORATIVE ELEMENTS ── */
body::before {
    content: ''; /* Remove the old '🖋️' emoji content */
    position: absolute;
    bottom: 50px;
    left: 20px;
    width: 250px; /* Set a specific size for your image */
    height: 300px;
    background-image: url('angelskin.png'); /* Link to your local file */
    background-size: contain;
    background-repeat: no-repeat;
    background-position: center;
    transform: rotate(-15deg);
    /* Artsy blending filters */
    filter: drop-shadow(10px 10px 5px rgba(0,0,0,0.5)) sepia(0.3); 
    z-index: 5;
    pointer-events: none;
}

        body::after {
            content: '🌸';
            position: absolute;
            top: -0px;
            left: -20px;
            font-size: 80px;
            opacity: 0.8;
            filter: sepia(0.5);
            z-index: 5;
            pointer-events: none;
        }

        /* ── JOURNAL SPREAD ── */
        .journal-spread {
            background: var(--paper);
            width: 100%;
            max-width: 1100px;
            min-height: 750px;
            display: flex;
            box-shadow: 20px 20px 60px rgba(0,0,0,0.5);
            position: relative;
            transform: rotate(-0.5deg);
            border-radius: 4px;
            z-index: 2;
        }

        /* Scrapbook Sticker */
        .journal-spread::before {
            content: '⭐ April Memories';
            position: absolute;
            top: -20px;
            right: -10px;
            background: #F7CBCA;
            padding: 5px 15px;
            font-family: 'Caveat', cursive;
            transform: rotate(15deg);
            box-shadow: 3px 3px 5px rgba(0,0,0,0.2);
            z-index: 10;
        }

        .journal-spread::after {
            content: '';
            position: absolute;
            left: 50%;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(to right, rgba(0,0,0,0.1), rgba(0,0,0,0.05) 50%, rgba(0,0,0,0.1));
            transform: translateX(-50%);
        }

        .page { flex: 1; padding: 50px 40px; position: relative; }
        .page-left { border-right: 1px solid rgba(0,0,0,0.05); }

        .month-header {
            font-family: 'Caveat', cursive;
            font-size: 3.5rem;
            color: var(--pencil-gray);
            text-align: center;
            margin-bottom: 25px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            border: 1px solid #e2ddd3;
            padding: 10px;
            background: rgba(255,255,255,0.5);
        }

        .day-label {
            font-family: 'Playfair Display', serif;
            font-variant: small-caps;
            font-size: 0.75rem;
            text-align: center;
            padding-bottom: 5px;
            color: var(--pencil-gray);
        }

        .day-cell {
            aspect-ratio: 1;
            border: 1px solid #eee;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .day-cell:hover:not(.future) {
            transform: scale(1.15);
            z-index: 10;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: white;
        }

        .day-num {
            position: absolute;
            top: 2px;
            left: 4px;
            font-size: 0.7rem;
            opacity: 0.4;
        }

        .weather-icon { font-size: 1.5rem; }

        /* ── RIGHT PAGE: THE STORY ── */
        .page-right { display: flex; flex-direction: column; }
        
        .entry-date {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            border-bottom: 2px solid var(--accent-pink);
            margin-bottom: 25px;
            padding-bottom: 8px;
            transition: border-color 0.3s;
        }

        .weather-story { 
            font-size: 1.4rem; 
            line-height: 2.2rem; /* Matches line height for ruling */
            flex: 1; 
            /* Journal Ruling Lines */
            background-image: linear-gradient(var(--line-color) 1px, transparent 1px);
            background-size: 100% 2.2rem;
            padding-top: 0.2rem;
        }
        
        .weather-story em { color: var(--pencil-gray); font-style: italic; }

        .note-pad {
            margin-top: 30px;
            padding: 20px;
            border: 1px dashed var(--accent-pink);
            background: rgba(255, 183, 197, 0.05);
            font-style: italic;
            border-radius: 8px;
            position: relative;
        }

        .note-pad::before {
            content: '📌';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.2rem;
        }

        @media (max-width: 900px) {
            body { padding: 20px; }
            .journal-spread { flex-direction: column; min-height: auto; transform: none; }
            .page-left { border-right: none; border-bottom: 1px solid #eee; }
            body::before, body::after { display: none; }
        }
    </style>
</head>
<body>

    <main class="journal-spread">
        <section class="page page-left">
            <h1 class="month-header">April 2026</h1>
            <div class="calendar-grid" id="calendarGrid">
                <div class="day-label">Sun</div><div class="day-label">Mon</div>
                <div class="day-label">Tue</div><div class="day-label">Wed</div>
                <div class="day-label">Thu</div><div class="day-label">Fri</div>
                <div class="day-label">Sat</div>
            </div>
        </section>

        <section class="page page-right" id="entryPanel">
            <div class="entry-date" id="viewDate">April 19, 2026</div>
            <div class="weather-story" id="viewText">
                Detecting local weather to write your story...
            </div>
            <div class="note-pad">
                <strong>Ink Notes:</strong>
                <p id="viewNotes">The weather defines the mood of the entry. Select a past date to revisit your memories.</p>
            </div>
        </section>
    </main>

    <script>
        const weatherTypes = [
            { icon: '☀️', mood: 'Sunny', desc: 'A bright, smiling day with golden rays.' },
            { icon: '☁️', mood: 'Cloudy', desc: 'The sky is wearing a soft, gray blanket.' },
            { icon: '🌧️', mood: 'Rainy', desc: 'Little hearts falling from the sky.' },
            { icon: '🌈', mood: 'Rainbow', desc: 'A magical bridge after a light sprinkle.' },
            { icon: '🌬️', mood: 'Windy', desc: 'The trees are dancing in a cool breeze.' }
        ];

        async function fetchLocalWeather(lat, lon) {
            try {
                const response = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await response.json();
                const code = data.current_weather.weathercode;
                
                if (code === 0) return weatherTypes[0];
                if (code <= 3) return weatherTypes[1];
                if (code >= 51) return weatherTypes[2];
                return weatherTypes[4];
            } catch (e) {
                return weatherTypes[0];
            }
        }

        async function initCalendar() {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const localWeather = await fetchLocalWeather(pos.coords.latitude, pos.coords.longitude);
                populateGrid(localWeather);
            }, () => {
                populateGrid(weatherTypes[0]);
            });
        }

        function populateGrid(baseWeather) {
            const grid = document.getElementById('calendarGrid');
            const today = new Date();
            const currentDay = today.getDate();

            for (let i = 1; i <= 30; i++) {
                const cell = document.createElement('div');
                cell.className = 'day-cell';
                
                if (i > currentDay) {
                    cell.classList.add('future');
                    cell.style.opacity = "0.2";
                    cell.style.cursor = "default";
                    cell.innerHTML = `<span class="day-num">${i}</span>`;
                } else {
                    const weather = Math.random() > 0.8 ? weatherTypes[Math.floor(Math.random()*5)] : baseWeather;
                    cell.innerHTML = `
                        <span class="day-num">${i}</span>
                        <span class="weather-icon">${weather.icon}</span>
                    `;
                    cell.onclick = () => updateEntry(i, weather);
                }
                grid.appendChild(cell);
            }
        }

        function updateEntry(day, weather) {
            const inkColors = {
                'Sunny': '#3a9a9a',
                'Rainy': '#5D6B6B',
                'Windy': '#6a9a9a',
                'Stormy': '#8a9a9a',
                'Cloudy': '#8a9a9a',
                'Rainbow': 'linear-gradient(45deg, #ff0000, #ff7f00, #ffff00, #00ff00, #0000ff, #4b0082, #8b00ff)'
            };

            const selectedColor = inkColors[weather.mood] || '#1a1010';
            const storyText = document.getElementById('viewText');
            const notesText = document.getElementById('viewNotes');
            const dateHeader = document.getElementById('viewDate');

            if (weather.mood === 'Rainbow') {
                storyText.style.backgroundImage = inkColors['Rainbow'];
                storyText.style.webkitBackgroundClip = 'text';
                storyText.style.webkitTextFillColor = 'transparent';
                storyText.style.display = 'inline-block';
                notesText.style.color = '#4b0082';
                dateHeader.style.borderColor = '#ffb7c5';
            } else {
                storyText.style.backgroundImage = 'none';
                storyText.style.webkitTextFillColor = 'initial';
                storyText.style.color = selectedColor;
                notesText.style.color = selectedColor;
                dateHeader.style.borderColor = selectedColor;
            }

            dateHeader.innerText = `April ${day}, 2026`;
            storyText.innerHTML = `Today is a <em>${weather.mood}</em> day here. ${weather.desc}`; 

            const panel = document.getElementById('entryPanel');
            panel.style.opacity = 0;
            setTimeout(() => {
                panel.style.opacity = 1;
                panel.style.transition = 'opacity 0.5s';
            }, 50);
        }

        document.addEventListener('DOMContentLoaded', initCalendar);
    </script>
</body>
</html>
